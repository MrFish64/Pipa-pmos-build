name: Build postmarketOS for xiaomi-pipa
on:
  workflow_dispatch:
    inputs:
      extra_space_mb:
        description: "Extra rootfs free space in MB"
        required: false
        default: "2048" # В 2026 году софт весит больше, лучше иметь запас

  schedule:
    - cron: "14 3 2 * *"

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        ui: [plasma-desktop, gnome-mobile, phosh, plasma-mobile, sxmo-de-sway]
    
    permissions:
      contents: write

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/share/swift
          sudo apt-get clean
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3 openssl git qemu-user-static binfmt-support p7zip-full
          sudo systemctl start binfmt-support
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git ~/pmbootstrap
          echo "$HOME/pmbootstrap" >> $GITHUB_PATH

      - name: Restore pmbootstrap cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/var/pmbootstrap/packages
            ~/.local/var/pmbootstrap/cache_apk_index
            ~/.local/var/pmbootstrap/cache_ccache
          key: pmos-pipa-${{ matrix.ui }}-${{ hashFiles('pmbootstrap_v3.cfg') }}-${{ github.run_id }}
          restore-keys: |
            pmos-pipa-${{ matrix.ui }}-${{ hashFiles('pmbootstrap_v3.cfg') }}-

      - name: Write pmbootstrap config
        run: |
          mkdir -p ~/.config
          UI="${{ matrix.ui }}"
          EXTRA_SPACE="${{ github.event.inputs.extra_space_mb || '2048' }}"
          # Используем актуальный формат конфига v3
          sed \
            -e "s|^ui = .*|ui = ${UI}|" \
            -e "s|^extra_space = .*|extra_space = ${EXTRA_SPACE}|" \
            -e "s|^work = .*|work = /home/runner/.local/var/pmbootstrap|" \
            pmbootstrap_v3.cfg > ~/.config/pmbootstrap_v3.cfg

      - name: Initialize pmbootstrap
        env:
          PMB_FDE_PASSWORD: "147147"
        run: |
          python3 ~/pmbootstrap/pmbootstrap.py --config ~/.config/pmbootstrap_v3.cfg init -y
          python3 ~/pmbootstrap/pmbootstrap.py --config ~/.config/pmbootstrap_v3.cfg pull

      - name: Build images
        env:
          PMB_FDE_PASSWORD: "147147"
        run: |
          python3 ~/pmbootstrap/pmbootstrap.py --config ~/.config/pmbootstrap_v3.cfg install --fde --password 147147 --details-to-stdout

      - name: Export and Compress
        run: |
          mkdir -p /tmp/pmos-export
          # Ищем файлы динамически, так как пути зависят от версии pmbootstrap
          find /home/runner/.local/var/pmbootstrap/chroot_rootfs_xiaomi-pipa/boot/ -type f -exec cp {} /tmp/pmos-export/ \;
          find /home/runner/.local/var/pmbootstrap/chroot_native/home/pmos/rootfs/ -name "*.img" -exec cp {} /tmp/pmos-export/xiaomi-pipa.img \;
          
          cd /tmp/pmos-export
          7z a -mx=2 -v1g /tmp/pmos-xiaomi-pipa-${{ matrix.ui }}.7z ./*

      - name: Set release tag
        run: echo "RELEASE_TAG=build-$(date -u +'%Y%m%d-%H%M')" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "pmOS pipa [${{ matrix.ui }}] - ${{ env.RELEASE_TAG }}"
          body: |
            ## postmarketOS for Xiaomi Pad 6 (pipa)
            - **UI:** `${{ matrix.ui }}`
            - **Password:** `147147`
            
            Flash Turotial:
            ```sh
            fastboot erase dtbo
            fastboot flash boot boot.img
            fastboot flash userdata xiaomi-pipa.img
            ```
          files: /tmp/pmos-xiaomi-pipa-${{ matrix.ui }}.7z*
