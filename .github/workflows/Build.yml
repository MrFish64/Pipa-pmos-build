name: Build postmarketOS for xiaomi-pipa

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" 
    
permissions:
  contents: write
  
jobs:
  build:
    name: Build ${{ matrix.ui }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ui: [plasma-desktop, gnome-mobile]

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/share/swift
          sudo apt-get clean
          sudo apt-get autoremove -y
          sudo rm -rf /var/cache/apt /var/lib/apt/lists/*
          df -h

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install host dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3 openssl git qemu-user-static binfmt-support zip
          sudo systemctl start binfmt-support
          sudo update-binfmts --enable qemu-aarch64
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git ~/pmbootstrap
          mkdir -p ~/.local/bin
          ln -s "$HOME/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Restore pmbootstrap cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/var/pmbootstrap/packages
            ~/.local/var/pmbootstrap/cache_apk_index
            ~/.local/var/pmbootstrap/cache_ccache
          key: pmos-pipa-${{ matrix.ui }}-${{ hashFiles('pmbootstrap_v3.cfg') }}-${{ github.run_id }}
          restore-keys: |
            pmos-pipa-${{ matrix.ui }}-${{ hashFiles('pmbootstrap_v3.cfg') }}-

      - name: Write pmbootstrap config
        run: |
          mkdir -p ~/.config
          UI="${{ matrix.ui }}"
          EXTRA_SPACE="0"
          sed \
            -e "s|^ui = .*|ui = ${UI}|" \
            -e "s|^extra_space = .*|extra_space = ${EXTRA_SPACE}|" \
            -e "s|^work = .*|work = /home/runner/.local/var/pmbootstrap|" \
            pmbootstrap_v3.cfg > ~/.config/pmbootstrap_v3.cfg
          cat ~/.config/pmbootstrap_v3.cfg

      - name: Initialize pmbootstrap
        env:
          PMB_FDE_PASSWORD: "147147"
        run: yes "" | pmbootstrap --config ~/.config/pmbootstrap_v3.cfg init

      - name: Pull latest pmaports
        run: |
          pmbootstrap --config ~/.config/pmbootstrap_v3.cfg --details-to-stdout -y pull
          cd ~/.local/var/pmbootstrap/cache_git/pmaports
          git remote add pipa https://github.com/pipa-project/pmaports-pipa.git || true
          git fetch pipa
          git reset --hard pipa/$(git remote show pipa | awk '/HEAD branch/ {print $NF}')

      - name: Build images
        env:
          PMB_FDE_PASSWORD: "147147"
        run: |
          pmbootstrap --config ~/.config/pmbootstrap_v3.cfg --details-to-stdout -y install --fde --password 147147 2>&1 | tee build.log
          echo "=== Build Summary ==="
          tail -50 build.log
        timeout-minutes: 300

      - name: Export and ZIP
        run: |
          mkdir -p /tmp/export
          cp -rL /home/runner/.local/var/pmbootstrap/chroot_rootfs_xiaomi-pipa/boot/* /tmp/export/
          cp -rL /home/runner/.local/var/pmbootstrap/chroot_native/home/pmos/rootfs/xiaomi-pipa.img /tmp/export/
          cd /tmp/export
          zip -r "/tmp/pipa-${{ matrix.ui }}.zip" .
          ls -lh /tmp/pipa-${{ matrix.ui }}.zip

      - name: Upload temporary artifact
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.ui }}
          path: /tmp/pipa-${{ matrix.ui }}.zip
          retention-days: 1

  publish:
    name: Create Combined Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all ZIPs
        uses: actions/download-artifact@v4
        with:
          path: /tmp/release-files
          pattern: zip-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-$(date +'%Y%m%d-%H%M')
          name: "Xiaomi Pad 6 Builds - $(date +'%Y-%m-%d')"
          body: |
            ## postmarketOS for Xiaomi Pad 6 (xiaomi-pipa)


            | Field    | Value |
            |----------|-------|
            | Device   | Xiaomi Pad 6 (xiaomi-pipa) |
            | UI       | Plasma Desktop & GNOME Mobile |
            | Built    | $(date +'%Y-%m-%d') |
            | Branch   | pmaports edge |

            ## Contents of the archive


            | File | Description |
            |------|-------------|
            | `boot.img` | Kernel + initramfs (fastboot) |
            | `xiaomi-pipa.img` | Root filesystem image |

            Each UI is packed into its own .zip archive. Download the one you prefer.
            Extract with: `unzip pipa-*.zip`

            ## Flashing instructions

            Prerequisites: unlocked bootloader, fastboot installed on your PC.

            ```sh
            # Boot into fastboot mode
            # Power off, then hold Volume Down + Power

            fastboot erase dtbo
            fastboot flash boot boot.img
            fastboot flash userdata xiaomi-pipa.img
            fastboot reboot
            ```

            Default login: username `user`, password `147147`

            Warning: flashing will wipe userdata. Back up your Android data first.
          files: /tmp/release-files/*.zip
          fail_on_unmatched_files: true
          
