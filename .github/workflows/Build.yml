name: 🐧 postmarketOS • Xiaomi Pad 6 (pipa) NIGHTLY

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: pmos-pipa
  cancel-in-progress: true

permissions:
  contents: write

env:
  DEVICE: xiaomi-pipa
  WORKDIR: /home/runner/.local/var/pmbootstrap
  CONFIG: /home/runner/.config/pmbootstrap_v3.cfg
  PASSWORD: "147147"

jobs:
  build:
    name: 🛠️ Build (${{ matrix.ui }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ui: [plasma-desktop, gnome-mobile]

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 💾 Free space (important for pmOS builds)
      - name: Maximize disk space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 1024
          swap-size-mb: 4096

      - name: Cleanup runner
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift || true
          sudo apt-get clean
          df -h

      # 📦 Dependencies
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3 git openssl \
            qemu-user-static binfmt-support \
            zip

          sudo systemctl start binfmt-support || true
          sudo update-binfmts --enable qemu-aarch64 || true

          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git ~/pmbootstrap

          mkdir -p ~/.local/bin
          ln -sf ~/pmbootstrap/pmbootstrap.py ~/.local/bin/pmbootstrap
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # ⚡ Cache (speed boost)
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/var/pmbootstrap/packages
            ~/.local/var/pmbootstrap/cache_apk_index
            ~/.local/var/pmbootstrap/cache_ccache
            ~/.local/var/pmbootstrap/cache_distfiles
          key: pmos-${{ env.DEVICE }}-${{ matrix.ui }}

      # ⚙️ Config generation
      - name: Generate pmbootstrap config
        run: |
          mkdir -p ~/.config

          sed \
            -e "s|^ui = .*|ui = ${{ matrix.ui }}|" \
            -e "s|^work = .*|work = ${WORKDIR}|" \
            pmbootstrap_v3.cfg > $CONFIG

          echo "=== CONFIG ==="
          cat $CONFIG

      # 🚀 Init
      - name: Init pmbootstrap
        env:
          PMB_FDE_PASSWORD: ${{ env.PASSWORD }}
        run: |
          pmbootstrap --config $CONFIG init --non-interactive

      # 🔄 Sync sources
      - name: Sync pmaports + overlay
        run: |
          pmbootstrap --config $CONFIG -y pull

          cd "${WORKDIR}/cache_git/pmaports"

          git remote add pipa https://github.com/pipa-project/pmaports-pipa.git || true
          git fetch pipa

          BRANCH=$(git remote show pipa | awk '/HEAD branch/ {print $NF}')
          git reset --hard "pipa/$BRANCH"

      # 🏗 Build
      - name: Build images
        env:
          PMB_FDE_PASSWORD: ${{ env.PASSWORD }}
        run: |
          set -euo pipefail

          pmbootstrap --config $CONFIG \
            --details-to-stdout -y install \
            --fde --password $PASSWORD \
            --jobs $(nproc) \
            2>&1 | tee build.log

          echo "=== LAST LOG ==="
          tail -50 build.log
        timeout-minutes: 360

      # 📦 Package
      - name: Package artifacts
        run: |
          set -e

          OUT="/tmp/${DEVICE}-${{ matrix.ui }}"
          mkdir -p "$OUT"

          cp -rL ${WORKDIR}/chroot_rootfs_${DEVICE}/boot/* "$OUT/" || true
          find ${WORKDIR} -name "${DEVICE}.img" -exec cp {} "$OUT/" \;

          cd "$OUT"
          zip -r "/tmp/${DEVICE}-${{ matrix.ui }}.zip" .

          echo "PACKAGED: $(ls -lh /tmp/${DEVICE}-${{ matrix.ui }}.zip)"

      # 📤 Upload artifacts
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.ui }}
          path: /tmp/${{ env.DEVICE }}-${{ matrix.ui }}.zip
          retention-days: 2

  release:
    name: 🚀 Release Nightly
    runs-on: ubuntu-latest
    needs: build

    steps:
      # 📥 Download artifacts
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/release
          merge-multiple: true

      # 🧾 Metadata
      - name: Set metadata
        run: |
          echo "TAG=build-$(date +'%Y%m%d-%H%M-%S')" >> $GITHUB_ENV
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      # 🧪 Safety check (no empty releases)
      - name: Verify artifacts
        run: |
          echo "Artifacts:"
          ls -lah /tmp/release
          test -n "$(ls -A /tmp/release/*.zip)"

      # 🧹 Cleanup old releases
      - name: Cleanup old releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 🚀 Publish release
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "📱 Xiaomi Pad 6 • postmarketOS NIGHTLY (${{ env.DATE }})"
          body: |
            # 🐧 postmarketOS Nightly Build

            Device: Xiaomi Pad 6 (xiaomi-pipa)  
            Date: ${{ env.DATE }}

            ---

            ## 🧾 Build variants
            - Plasma Desktop
            - GNOME Mobile

            ---

            ## 📦 Contents
            - boot.img
            - xiaomi-pipa.img

            ---

            ## ⚡ Flash instructions

            ```
            fastboot erase dtbo
            fastboot flash boot boot.img
            fastboot flash userdata xiaomi-pipa.img
            fastboot reboot
            ```

            ---

            ## 🔐 Default login
            user / 147147

            ---

            ⚠️ Nightly build — expect bugs, instability possible.

          files: |
            /tmp/release/*.zip
